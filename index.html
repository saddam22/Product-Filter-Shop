<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Filter Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 p-4">

     <!-- Filter Section -->
      <div class="flex flex-col md:flex-row mb-6">
        <div class="w-full md:w-1/4 p-4 bg-white rounded shadow">
         <h2 class="text-lg font-bold mb-4">Filters</h2>   
        
          <!-- Category Filter -->
           <div class="mb-4">
            <h3 class="font-semibold mb-2">Category</h3>
            <select id="categoryFilter" class="w-full border p-2 rounded">
               <option value="all">All</option> 
               <option value="Electronics">Electronics</option> 
               <option value="Fashion">Fashion</option> 
               <option value="Home">Home</option> 
               <option value="Toys">Toys</option>
               <option value="Computer">Computer</option> 
            </select>
           </div>

            <!-- Price Filter -->
             <div class="mb-4">
                <h3> Price (Max) </h3>
                <input type="range" id="priceFilter" min="0" max="200" step="5" value="200" class="w-full">
                <span id="priceValue" class="text-sm font-medium">200</span>$
            </div>

            <!-- Rating Filter -->
             <div class="mb-4">
                <h3 class="font-semibold mb-2">Min Rating</h3>
                <select id="ratingFilter" class="w-full border p-2 rounded">
                <option value="0">All</option>
                <option value="1">1 Stars</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
                </select>
            </div>
        </div>

        <!-- Products Section -->
         <div class="w-full md:w-3/4 p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="productContainer">
            <!-- JS will inject product cards here -->
         </div>
      </div>

      <script src="products.js"></script>
      <script src="script.js"></script>
</body>
</html>
