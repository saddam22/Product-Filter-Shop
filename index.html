<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Filter Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4 font-[Roboto]">

     <!-- Filter Section -->
      <div class="flex flex-col md:flex-row mb-6">
        <div class="w-full md:w-1/4 p-4 bg-white rounded shadow">
         <h2 class="text-lg font-bold mb-4">Filters</h2>   
        
         <!--Search-->
         <input type="text" id="searchInput" placeholder="Search Products......." class="w-full border p-2 rounded">

         <!-- Category Filter -->
           <div class="mb-4">
            <h3 class="font-semibold mb-2">Category</h3>
            <select id="categoryFilter" class="w-full border p-2 rounded">
               <option value="all">All</option> 
               <option value="Electronics">Electronics</option> 
               <option value="Fashion">Fashion</option> 
               <option value="Home">Home</option> 
               <option value="Toys">Toys</option>
               <option value="Computer">Computer</option> 
            </select>
           </div>

            <!-- Price Filter -->
             <div class="mb-4">
                <h3> Price (Max) </h3>
                <input type="range" id="priceFilter" min="0" max="200" step="5" value="200" class="w-full">
                <span id="priceValue" class="text-sm font-medium">200</span>$
            </div>

            <!-- Rating Filter -->
             <div class="mb-4">
                <h3 class="font-semibold mb-2">Min Rating</h3>
                <select id="ratingFilter" class="w-full border p-2 rounded mb-2">
                <option value="0">All</option>
                <option value="1">1 Stars</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
                </select>

                <!-- Color -->
                 <select id="colorFilter" class="w-full border p-2 rounded mb-2">
                  <option value="all">All Colors</option>
                  <option value="Black">Black</option>
                  <option value="Blue">Blue</option>
                  <option value="Red">Red</option>
                  <option value="Yellow">Yellow</option>
                 </select>

                 <!-- Size -->
                  <select id="sizeFilter" class="w-full border p-2 rounded mb-2">
                    <option value="all">All Sizes</option> 
                     <option value="Small">Small</option>
                     <option value="M">M</option>
                     <option value="L">L</option>
                     <option value="One Size">One Size</option>
                  </select>

                  <!-- Sort -->
                   <select id="sortFilter" class="w-full border p-2 rounded">
                     <option value="Default">Sort By</option>
                     <option value="priceLow">Price: Low → High</option>
                     <option value="priceHigh">Price: High → Low</option>
                     <option value="ratingHigh">Rating: High → Low</option>
                   </select>  

                   <!--Active Filters Badges-->
                   <div id="activeFilters" class="mt-4 space-x-2"></div>
            </div>
        </div>

        <!-- Products Section -->
         <div class="w-full md:w-3/4 p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="productContainer">
            <!-- JS will inject product cards here -->
         </div>
      </div>

      <!-- Cart/Wishlist Counter -->
       <div class="fixed bottom-4 right-4 flex gap-4">
         <button id="cartBtn" class="bg-blue-500 text-white px-4 py-2 rounded shadow">Cart (<span id="cartCount">0</span>)</button>
         <button id="wishlistBtn" class="bg-pink-500 text-white px-4 py-2 rounded shadow">Wishlist(<span id="wishlistCount">0</span>)</button>
       </div>

       <!-- Cart Modal -->
        <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
         <div class="bg-white w-96 rounded p-4 relative">
          <h2 class="text-lg font-bold mb-4">Cart</h2>
          <div id="cartItems" class="space-y-2 max-h-64 overflow-y-auto"></div>
          <div class="mt-4 font-semibold">Total: $<span id="cartTotal">0</span></div>
          <div class="mt-4 flex justify-end gap-2">
            <button onclick="closeCart()" class="px-3 py-1 rounded bg-gray-300">Close</button>
            <button onclick="checkoutCart()" class="px-3 py-1 rounded bg-green-500 text-white">Checkout</button>
          </div>
          <button onclick="closeCart()" class="absolute top-2 right-2 text-gray-600">✖</button>
        </div> 
        </div>
    
        <!-- Wishlist Modal -->
      <div id="wishlistModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
      <div class="bg-white w-96 rounded p-4 relative">
        <h2 class="text-lg font-bold mb-4">Wishlist</h2>
        <div id="wishlistItems" class="space-y-2 max-h-64 overflow-y-auto"></div>
        <div class="mt-4 flex justify-end gap-2">
        <button onclick="closeWishlist()" class="px-3 py-1 rounded bg-gray-300">Close</button>
        </div>
        <button onclick="closeWishlist()" class="absolute top-2 right-2 text-gray-600">✖</button>
      </div>  
      </div>  


      <script src="products.js"></script>
      <script src="script.js"></script>
</body>
</html>
